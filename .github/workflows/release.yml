name: release

# Publishes every RuleAtlas package to PyPI when a version tag (v*) is pushed.
#
# Uses PyPI Trusted Publishing (OIDC) — no long-lived token. One-time setup per package on PyPI:
#   PyPI > project > Publishing > add a GitHub trusted publisher with
#     owner: SignalSafeSoftware, repo: ruleatlas-packages, workflow: release.yml, environment: pypi
# Publish order doesn't matter (wheels declare deps by name+version; they resolve at install time).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  pypi:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [contracts, persistence, discovery-core, claims, extraction, exports, ai, demo]
    environment: pypi
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: uv build
      - name: Publish ${{ matrix.package }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package }}/dist
