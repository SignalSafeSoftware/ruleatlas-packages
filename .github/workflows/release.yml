name: release

# Publishes every RuleAtlas package to PyPI when a version tag (v*) is pushed.
#
# Uses PyPI Trusted Publishing (OIDC) — no long-lived token. One-time setup per package on PyPI:
#   PyPI > project > Publishing > add a GitHub trusted publisher with
#     owner: SignalSafeSoftware, repo: ruleatlas-packages, workflow: release.yml, environment: pypi
# Publish order doesn't matter (wheels declare deps by name+version; they resolve at install time).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  pypi:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [contracts, persistence, discovery-core, claims, extraction, exports, ai, demo]
    environment: pypi
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: uv build
      - name: Publish ${{ matrix.package }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package }}/dist

  # discovery-ui publishes to npm (separate ecosystem). Requires an NPM_TOKEN secret and an npm
  # org/scope (@ruleatlas). Enabled once those are configured.
  npm:
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build + publish discovery-ui
        working-directory: discovery-ui
        run: |
          yarn install --frozen-lockfile || yarn install
          yarn build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
